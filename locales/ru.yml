  help_message: >
    Чтобы вывести ваш QR код, используйте команду /qrcode

    Чтобы получить ссылку для входа на сайт S95, используйте команду /login

    Все _команды_ доступны через левое нижнее меню.

    Боту можно что-нибудь написать. Например, "Бот, паркран" и бот найдёт случайное фото с забега.
    Либо "Бот, диаграмма" и бот построит гистограмму по результатам вашего последнего забега.

    Вопросы и предложения по боту и сайту, направляйте @vol1ura (Володин Юра)

    🤖 *S95 Bot*, версия {}
  how_to_rotate_labels: 'При необходимости надписи можно повернуть. Для этого отправьте сообщение "бот диаграмма 30", где 30 - угол поворота.'

  confirm_registration: >
    Вы пока не зарегистрированы. Хотите зарегистрироваться?

    Нажимая кнопку *Да, принимаю* вы [принимаете правила участия](https://s95.ru/pages/rules) и даёте [согласие на обработку персональных данных](https://s95.ru/pages/privacy-policy).

  user_without_athlete: >
    Вы зарегистрированы, но участник почему-то не привязан или не создан.

    Напишите @vol1ura, чтобы решить этот вопрос.

  input_athletes_id: 'Введите свой номер ID (только цифры, без буквы А в начале). Либо /reset для отмены.'

