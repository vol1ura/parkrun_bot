  available_commands: 'Все команды доступны через левое нижнее меню'

  you_already_have_id: |
    Если вы никогда раньше не участвовали в наших мероприятиях, нажмите "*Я новый участник*".
    Если же вы когда-либо участвовали в наших мероприятиях, паркранах, забегах 5 вёрст или RunPark, то у вас _уже есть персональный штрих-код с ID участника_ (это номер, который идёт после буквы "A" и написан на карточке с штрих-кодом), нажмите "*Ввести ID*".

