  home_event_suggestion: 'Установите также ваш домашний забег с помощью команды /home (локация, которую вы предпочитаете, её можно установить или поменять позже)'

  setup_running_club: 'Клуб не установлен. Хотите установить?'
  club_not_found: Клуб не найден. Попробуйте ввести название ещё раз (для отмены введите /reset)

  setup_home_run: 'Домашний забег не установлен. Хотите установить?'

  athlete_code_search: >
    Введите свой ID в системе *parkrun* или *S95* (предпочтительно), либо 5 вёрст, RunPark (*цифры* с вашего штрих-кода, *без буквы A*).

  athlete_code_check: >
    В системе S95 не удалось найти участника с ID=<b>{athlete_id}</b>. Возможно, всё ОК, вы просто ещё не участвовали в наших мероприятиях.

    <b>Проверьте</b>, что это действительно ваш номер <a href="{url}">на сайте</a>, а также убедитесь, что вы ввели только цифры, без буквы А в начале.

    Если всё верно, нажмите <b>Всё верно, создать</b>

  help_to_find_id: >
    Зайдите на сайт s95.ru и попробуйте через поиск найти себя.

    Ваш ID можно будет увидеть, нажав кнопку *штрихкод* на страничке участника.

