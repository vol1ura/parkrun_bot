ru:
  start_message: 'S95 Bot подключен. Наберите /help, чтобы посмотреть доступные команды.'
  greetings:
    - 'Приветствую, {}!'
    - 'Здравствуй, {}'
    - 'Привет, {}!'
    - 'Привет, бродяга 😉'
    - 'Здоровеньки булы!'
  phrases_about_myself:
    - 'Супер!'
    - 'Спасибо, всё нормально.'
    - 'Всё хорошо'
    - 'Отлично!'
    - 'Нормально, но в последнее время некогда тренироваться'
